<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalam Spin 2026 - Final Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #0093E9;
            --secondary: #80D0C7;
            --gold: #ffd700;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0c29; color: white; height: 100vh; 
            display: flex; justify-content: center; overflow: hidden;
        }
        
        .game-container { 
            width: 100%; max-width: 500px; height: 100vh; 
            background: linear-gradient(180deg, #241468 0%, #1a1a2e 100%);
            display: flex; flex-direction: column; position: relative; padding: 20px;
        }

        /* লগইন সেকশন */
        #loginSection { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            z-index:10000; display:flex; flex-direction:column; align-items:center;
        }
        .login-header-area { text-align:center; padding: 70px 0 30px; }
        
        @keyframes slowSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .login-header-area i { 
            font-size: 60px; color: var(--gold); display: inline-block;
            animation: slowSpin 5s linear infinite; text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }

        .login-card { background: white; border-radius: 20px; padding: 25px; width: 85%; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .game-header { display: flex; justify-content: space-between; align-items: center; color: var(--gold); font-weight: bold; padding: 10px 5px; }
        .wheel-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .wheel-box { position: relative; width: 280px; height: 280px; transition: transform 0.8s ease; }
        .wheel-small { transform: scale(0.75); }

        .wheel-img { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid var(--gold); 
            background: conic-gradient(#ff4757 0deg 120deg, #2f3542 120deg 240deg, #2ed573 240deg 360deg); 
            transition: transform 20s cubic-bezier(0.15, 0, 0.15, 1); 
        }
        
        .wheel-pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid var(--gold); z-index: 10; }

        /* বেটিং বাটন অ্যানিমেশন */
        @keyframes betGlow {
            0% { box-shadow: 0 0 0px rgba(255, 215, 0, 0); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 0px rgba(255, 215, 0, 0); }
        }

        .bet-buttons { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 30px; }
        .bet-btn { 
            flex: 1; padding: 20px 5px; border-radius: 15px; color: white; font-weight: bold; 
            border: 2px solid rgba(255,255,255,0.1); cursor: pointer; text-align: center; transition: 0.3s;
        }

        /* যখন বাজি ধরা সচল */
        .bet-active { 
            animation: betGlow 1.5s infinite; 
            border-color: var(--gold) !important; 
            opacity: 1 !important; 
            filter: grayscale(0) !important;
            pointer-events: auto !important;
        }

        /* যখন বন্ধ */
        .disabled { opacity: 0.25; pointer-events: none !important; filter: grayscale(1); }

        .footer-info { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .chip-selector { background: #fff; color: #241468; padding: 10px 18px; border-radius: 30px; font-weight: bold; cursor: pointer; border: 2px solid var(--gold); transition: 0.3s; }
        .chip-menu { position: absolute; bottom: 100px; right: 25px; display: none; flex-direction: column; gap: 8px; z-index: 100; }
        .chip { width: 55px; height: 55px; border-radius: 50%; background: white; color: #241468; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 3px solid var(--gold); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="loginSection">
        <div class="login-header-area">
            <i class="fas fa-dharmachakra"></i>
            <h1 style="color:white; font-size: 30px; margin-top: 10px;">কালাম স্পিন লগইন</h1>
        </div>
        <div class="login-card">
            <div class="input-group">
                <input type="text" id="uid" placeholder="ইউজার আইডি / মোবাইল">
            </div>
            <div class="input-group">
                <input type="password" id="pin" placeholder="সিক্রেট পিন">
            </div>
            <button class="btn-main" onclick="processLogin()">প্রবেশ করুন</button>
            <p id="msg" style="text-align:center; font-size:12px; margin-top:10px; color:red;"></p>
        </div>
    </div>

    <div class="game-header">
        <span id="status">লোড হচ্ছে...</span>
        <span><i class="fas fa-clock"></i> <span id="timer">00</span>s</span>
    </div>

    <div class="wheel-area">
        <div id="wheelBox" class="wheel-box">
            <div class="wheel-pointer"></div>
            <div id="wheel" class="wheel-img"></div>
        </div>
    </div>

    <div id="betArea" class="bet-buttons disabled">
        <button id="btnRED" class="bet-btn" style="background:#ff4757" onclick="placeBet('RED')">RED<br><small id="rT">৳0</small></button>
        <button id="btnBLACK" class="bet-btn" style="background:#2f3542" onclick="placeBet('BLACK')">BLACK<br><small id="bT">৳0</small></button>
        <button id="btnGREEN" class="bet-btn" style="background:#2ed573" onclick="placeBet('GREEN')">GREEN<br><small id="gT">৳0</small></button>
    </div>

    <div id="chipArea" class="chip-menu"></div>

    <div class="footer-info">
        <div>
            <small style="color:#aaa;">ব্যালেন্স</small>
            <div style="font-size:22px; font-weight:bold; color:var(--gold);">৳<span id="bal">0</span></div>
        </div>
        <div id="chipTrigger" class="chip-selector disabled" onclick="toggleChipMenu()">
            <span id="selectedVal">৳10</span>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTq_5tqo2p5-RAw4UiEQYRMBFHZJ6euteFsZkS_xCzByo5AhSW6GD4fjWUQ6A8BSa1/exec";
    
    let activeUser = "", activeBal = 0, selectedChip = 10, isSpinning = false, rotation = 0;
    let localBets = { RED: 0, BLACK: 0, GREEN: 0 };

    async function processLogin() {
        const u = document.getElementById('uid').value, p = document.getElementById('pin').value;
        if(!u || !p) return;
        document.getElementById('msg').innerText = "যাচাই করা হচ্ছে...";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${u}&password=${p}`);
            const data = await res.json();
            if(data.status === "success") {
                activeUser = u; activeBal = data.balance;
                document.getElementById('bal').innerText = activeBal;
                document.getElementById('loginSection').classList.add('hidden');
                initGame();
            } else { document.getElementById('msg').innerText = "ইউজার বা পিন ভুল!"; }
        } catch(e) { document.getElementById('msg').innerText = "সার্ভার এরর!"; }
    }

    async function initGame() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getSettings`);
            const data = await res.json();
            document.getElementById('chipArea').innerHTML = data.chips.map((val, i) => 
                `<div class="chip" onclick="setChip(${val}, '${data.displayChips[i]}')">${data.displayChips[i]}</div>`
            ).join('');
            startCycle();
        } catch(e) { console.error("Load Failed"); }
    }

    function setChip(v, label) {
        selectedChip = v;
        document.getElementById('selectedVal').innerText = "৳" + label;
        document.getElementById('chipArea').style.display = 'none';
    }

    function toggleChipMenu() {
        if(!isSpinning) {
            const m = document.getElementById('chipArea');
            m.style.display = (m.style.display==='flex')?'none':'flex';
        }
    }

    function startCycle() {
        setInterval(() => {
            const sec = new Date().getSeconds();
            
            // ১৫ সেকেন্ড সময় (০-১৫ এবং ৩০-৪৫)
            let isBetTime = (sec >= 0 && sec < 15) || (sec >= 30 && sec < 45);
            let timeRem = isBetTime ? (sec < 15 ? 15 - sec : 45 - sec) : 0;

            if (isBetTime) {
                if(isSpinning === "done") resetUI(); 
                document.getElementById('timer').innerText = timeRem;
                document.getElementById('status').innerHTML = `<i class="fas fa-coins"></i> বাজি ধরুন`;
                
                // বাজি ধরার বাটন এবং চিপস বাটন একসাথে সচল
                toggleControls(true);
            } else {
                if(!isSpinning && (sec === 15 || sec === 45)) {
                    toggleControls(false); // সবকিছু লক করা
                    triggerResult();
                }
                document.getElementById('timer').innerText = "0";
            }
        }, 1000);
    }

    function toggleControls(active) {
        const betArea = document.getElementById('betArea');
        const chipTrigger = document.getElementById('chipTrigger');
        const wheelBox = document.getElementById('wheelBox');

        if(active && !isSpinning) {
            betArea.classList.remove('disabled');
            chipTrigger.classList.remove('disabled');
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.add('bet-active'));
            wheelBox.classList.add('wheel-small');
        } else {
            betArea.classList.add('disabled');
            chipTrigger.classList.add('disabled');
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('bet-active'));
            wheelBox.classList.remove('wheel-small');
            document.getElementById('chipArea').style.display = 'none';
        }
    }

    async function placeBet(col) {
        if(isSpinning || activeBal < selectedChip) return;
        activeBal -= selectedChip;
        localBets[col] += selectedChip;
        document.getElementById('bal').innerText = activeBal;
        document.getElementById(col === 'RED' ? 'rT' : col === 'BLACK' ? 'bT' : 'gT').innerText = "৳" + localBets[col];
        fetch(`${SCRIPT_URL}?action=placeBet&username=${activeUser}&amount=${selectedChip}&colorName=${col}`);
    }

    async function triggerResult() {
        isSpinning = true;
        document.getElementById('status').innerHTML = `<i class="fas fa-sync fa-spin"></i> ঘুরছে...`;
        try {
            const res = await fetch(`${SCRIPT_URL}?action=processWinner&username=${activeUser}`);
            const data = await res.json();
            let targetDeg = (data.winner === "RED") ? 60 : (data.winner === "BLACK") ? 180 : 300;
            
            rotation = rotation + (360 * 8) + (360 - (rotation % 360)) - targetDeg;
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                activeBal = data.newBalance;
                document.getElementById('bal').innerText = activeBal;
                document.getElementById('status').innerHTML = `<i class="fas fa-trophy"></i> বিজয়ী: ${data.winner}`;
                setTimeout(() => { isSpinning = "done"; }, 5000);
            }, 20000); 
        } catch(e) { console.error("Error"); }
    }

    function resetUI() {
        isSpinning = false;
        localBets = { RED: 0, BLACK: 0, GREEN: 0 };
        document.getElementById('rT').innerText = "৳0";
        document.getElementById('bT').innerText = "৳0";
        document.getElementById('gT').innerText = "৳0";
        document.getElementById('wheel').style.transition = "none";
        document.getElementById('wheel').style.transform = `rotate(${rotation % 360}deg)`;
        setTimeout(() => { document.getElementById('wheel').style.transition = "transform 20s cubic-bezier(0.15, 0, 0.15, 1)"; }, 50);
    }
</script>
</body>
</html>
