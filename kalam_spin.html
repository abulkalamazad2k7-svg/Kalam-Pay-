<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalam Wheel 2026 - Master Sync</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .game-container { width: 90%; max-width: 400px; background: #1a1a2e; border-radius: 30px; padding: 20px; border: 3px solid #ffd700; text-align: center; position: relative; }
        #loginSection, #offSection { position: absolute; top:0; left:0; width:100%; height:100%; background:#1a1a2e; z-index:1000; border-radius:30px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .login-input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ffd700; background: #0f0c29; color: white; text-align: center; }
        .btn { background: #ffd700; color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; width: 80%; }
        .wheel-img { width: 250px; height: 250px; border-radius: 50%; border: 8px solid #ffd700; margin: 20px auto; background: conic-gradient(#ff4757 0deg 120deg, #2f3542 120deg 240deg, #2ed573 240deg 360deg); transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); }
        .bet-buttons { display: flex; justify-content: space-between; gap: 10px; margin: 20px 0; }
        .bet-btn { flex: 1; padding: 15px 5px; border-radius: 15px; color: white; font-weight: bold; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        .chip-menu { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .chip { width: 45px; height: 45px; border-radius: 50%; background: white; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid #ffd700; }
        .hidden { display: none !important; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="offSection" class="hidden">
        <h2 id="offNotice" style="color:#ffd700; padding:20px;"></h2>
    </div>

    <div id="loginSection">
        <h2 style="color: #ffd700;">KALAM SPIN 2026</h2>
        <input type="text" id="uid" class="login-input" placeholder="User ID">
        <input type="password" id="pin" class="login-input" placeholder="PIN">
        <button class="btn" onclick="processLogin()">LOGIN</button>
        <p id="msg" style="color:#ff4757; font-size:12px;"></p>
    </div>

    <div style="display:flex; justify-content:space-between; color:#ffd700; font-weight:bold;">
        <span id="status">READY</span>
        <span>TIME: <span id="timer">--</span>s</span>
    </div>

    <div id="wheel" class="wheel-img"></div>
    <div id="result" style="height:30px; font-weight:bold; color:#ffd700; font-size:20px;"></div>

    <div id="betArea" class="bet-buttons">
        <button class="bet-btn" style="background:#ff4757" onclick="placeBet('RED')">RED<br><small id="rT">৳0</small></button>
        <button class="bet-btn" style="background:#2f3542" onclick="placeBet('BLACK')">BLACK<br><small id="bT">৳0</small></button>
        <button class="bet-btn" style="background:#2ed573" onclick="placeBet('GREEN')">GREEN<br><small id="gT">৳0</small></button>
    </div>

    <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:20px; display:flex; justify-content:space-between; align-items:center;">
        <div style="text-align:left"><small>BALANCE</small><br>৳<span id="bal">0</span></div>
        <div id="chipBtn" style="color:#ffd700; font-weight:bold; border:1px solid #ffd700; padding:5px 15px; border-radius:15px;">৳10</div>
    </div>
    
    <div id="chipArea" class="chip-menu"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM_f2ga43KZJtN6Ox9yLuuSQfTwhlDfwZ8B87L9Ruy63VWslCuF4X7aCDlIN7Zqcjn/exec";
    let activeUser = "", activeBal = 0, selectedChip = 10, isSpinning = false, rotation = 0;
    let bets = { RED: 0, BLACK: 0, GREEN: 0 };
    let cfg = { betTime: 20, spinTime: 7 };

    async function processLogin() {
        const u = document.getElementById('uid').value, p = document.getElementById('pin').value;
        if(!u || !p) return;
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) });
        const data = await res.json();
        if(data.status === "success") {
            activeUser = u; activeBal = data.balance;
            document.getElementById('bal').innerText = activeBal;
            document.getElementById('loginSection').classList.add('hidden');
            loadSettings();
        } else { document.getElementById('msg').innerText = "Invalid ID/PIN"; }
    }

    async function loadSettings() {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getSettings" }) });
        const data = await res.json();
        if(data.status === "OFF") {
            document.getElementById('offSection').classList.remove('hidden');
            document.getElementById('offNotice').innerText = data.notice;
            return;
        }
        cfg = data;
        // চিপস লোড (I কলাম থেকে)
        document.getElementById('chipArea').innerHTML = data.chips.map(v => `<div class="chip" onclick="setChip(${v})">${v}</div>`).join('');
        startEngine();
    }

    function startEngine() {
        setInterval(async () => {
            const now = new Date();
            let totalCycle = cfg.betTime + 10; // বেটিং টাইম + প্রসেসিং গ্যাপ
            let sec = now.getSeconds() % totalCycle;

            if (sec < cfg.betTime) {
                if(isSpinning) resetUI();
                document.getElementById('timer').innerText = cfg.betTime - sec;
                document.getElementById('status').innerText = "PLACE BETS";
                document.getElementById('betArea').classList.remove('disabled');
            } else if (sec === cfg.betTime && !isSpinning) {
                document.getElementById('betArea').classList.add('disabled');
                runSpin();
            }
        }, 1000);
    }

    async function runSpin() {
        isSpinning = true;
        document.getElementById('status').innerText = "SPINNING...";
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "processWinner", username: activeUser }) });
        const data = await res.json();
        
        let targetDeg = (data.winner === "RED") ? 60 : (data.winner === "BLACK") ? 180 : 300;
        rotation = rotation + (360 * 5) + (360 - (rotation % 360)) - targetDeg;
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            document.getElementById('result').innerText = "WINNER: " + data.winner;
            activeBal = data.newBalance;
            document.getElementById('bal').innerText = activeBal;
        }, 7000);
    }

    function placeBet(col) {
        if(isSpinning || activeBal < selectedChip) return;
        const code = (col === 'RED') ? '1' : (col === 'BLACK') ? '2' : '3';
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "placeBet", username: activeUser, amount: selectedChip, colorCode: code }) });
        activeBal -= selectedChip;
        bets[col] += selectedChip;
        document.getElementById('bal').innerText = activeBal;
        document.getElementById(col === 'RED' ? 'rT' : col === 'BLACK' ? 'bT' : 'gT').innerText = "৳" + bets[col];
    }

    function setChip(v) { selectedChip = v; document.getElementById('chipBtn').innerText = "৳" + v; }
    function resetUI() { isSpinning = false; bets = { RED: 0, BLACK: 0, GREEN: 0 }; document.getElementById('rT').innerText = "৳0"; document.getElementById('bT').innerText = "৳0"; document.getElementById('gT').innerText = "৳0"; document.getElementById('result').innerText = ""; }
</script>
</body>
</html>
