<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalam Wheel 2026 - Ultra Fullscreen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Full Display Setup */
        * { box-sizing: border-box; }
        :root {
            --primary: #0093E9;
            --secondary: #80D0C7;
            --white: #ffffff;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0c29; color: white; height: 100vh; 
            display: flex; justify-content: center; overflow: hidden;
        }
        
        .game-container { 
            width: 100%; max-width: 500px; height: 100vh; 
            background: linear-gradient(180deg, #241468 0%, #1a1a2e 100%);
            display: flex; flex-direction: column; position: relative; 
            padding: 20px; border: none;
        }

        /* --- LOGIN STYLE --- */
        #loginSection { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            z-index:10000; display:flex; flex-direction:column; align-items:center;
        }
        .login-header-area { text-align:center; color:white; padding: 70px 0 30px; }
        .login-header-area i { font-size: 50px; margin-bottom: 10px; }
        .login-card { 
            background: white; border-radius: 20px; padding: 25px; 
            box-shadow: var(--shadow); width: 85%; color: #333;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; font-weight: bold; text-align: left; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; background: #fafafa; 
        }
        .btn-main { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; 
            font-size: 16px; box-shadow: 0 4px 15px rgba(0,147,233,0.3); transition: 0.3s;
        }

        #offSection { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:#1a1a2e; z-index:10000; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
        }

        /* Header */
        .game-header { 
            display: flex; justify-content: space-between; align-items: center; 
            color: #ffd700; font-weight: bold; padding: 10px 5px; font-size: 16px; 
        }

        /* Wheel Area */
        .wheel-area { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        .wheel-img { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #ffd700; 
            background: conic-gradient(#ff4757 0deg 120deg, #2f3542 120deg 240deg, #2ed573 240deg 360deg); 
            transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .wheel-pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 20px solid transparent; 
            border-right: 20px solid transparent; border-top: 35px solid #ffd700; z-index: 10; 
        }

        /* Bet Buttons */
        .bet-buttons { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 30px; }
        .bet-btn { 
            flex: 1; padding: 20px 5px; border-radius: 20px; color: white; 
            font-weight: bold; border: 2px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }

        /* Footer Info */
        .footer-info { 
            background: rgba(0,0,0,0.6); padding: 20px; border-radius: 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;
        }
        .chip-selector { 
            background: #fff; color: #241468; padding: 12px 20px; border-radius: 30px; 
            font-weight: bold; cursor: pointer; border: 2px solid #ffd700; 
            display: flex; align-items: center; gap: 10px; font-size: 16px;
        }

        .chip-menu { 
            position: absolute; bottom: 120px; right: 25px; 
            display: none; flex-direction: column; gap: 10px; z-index: 100; 
        }
        .chip { 
            width: 60px; height: 60px; border-radius: 50%; background: white; 
            color: #241468; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer; border: 3px solid #9f73ab; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="game-container">

    <div id="offSection" class="hidden">
        <h2 id="offNotice" style="color:#ffd700; padding:20px; text-align:center;"></h2>
    </div>

    <div id="loginSection">
        <div class="login-header-area">
            <i class="fas fa-paper-plane"></i>
            <h1 style="font-size: 30px; margin:0; letter-spacing: 1px;">কালাম পে লগইন</h1>
        </div>
        <div class="login-card">
            <div class="input-group">
                <label>মোবাইল নম্বর / ইউজার আইডি</label>
                <input type="text" id="uid" placeholder="01XXXXXXXXX">
            </div>
            <div class="input-group">
                <label>পিন নম্বর</label>
                <input type="password" id="pin" placeholder="******">
            </div>
            <button class="btn-main" onclick="processLogin()">প্রবেশ করুন</button>
            <p id="msg" style="text-align:center; font-size:13px; margin-top:10px; color:#ff4757;"></p>
        </div>
    </div>

    <div class="game-header">
        <span id="status"><i class="fas fa-play"></i> WAITING...</span>
        <span><i class="fas fa-stopwatch"></i> <span id="timer">--</span>s</span>
    </div>

    <div class="wheel-area">
        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <div id="wheel" class="wheel-img"></div>
        </div>
    </div>

    <div id="betArea" class="bet-buttons">
        <button class="bet-btn" style="background:#ff4757" onclick="placeBet('RED')">
            RED <br> <small id="rT">৳0</small>
        </button>
        <button class="bet-btn" style="background:#2f3542" onclick="placeBet('BLACK')">
            BLACK <br> <small id="bT">৳0</small>
        </button>
        <button class="bet-btn" style="background:#2ed573" onclick="placeBet('GREEN')">
            GREEN <br> <small id="gT">৳0</small>
        </button>
    </div>

    <div id="chipArea" class="chip-menu"></div>

    <div class="footer-info">
        <div style="text-align: left;">
            <small style="color:#aaa; letter-spacing:1px;">MY BALANCE</small>
            <div style="font-size:22px; font-weight:800; color:#ffd700;">৳<span id="bal">0</span></div>
        </div>
        <div class="chip-selector" onclick="toggleChipMenu()">
            <span id="selectedVal">৳10</span> <i class="fas fa-chevron-up"></i>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFzbZQnhj_6FuBStg6XYVLiNT2qQnXWvSCuWESSvm_yK24SmPFGNAebBy8xD03UwQs/exec";
    let activeUser = "", activeBal = 0, selectedChip = 10, isSpinning = false, rotation = 0;
    let bets = { RED: 0, BLACK: 0, GREEN: 0 };
    let cfg = { betTime: 20, spinTime: 7 };

    const MIN_BET = 10;
    const MAX_BET = 1000000;

    async function processLogin() {
        const u = document.getElementById('uid').value, p = document.getElementById('pin').value;
        if(!u || !p) return;
        document.getElementById('msg').style.color = "#333";
        document.getElementById('msg').innerText = "যাচাই করা হচ্ছে...";
        
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) });
            const data = await res.json();
            if(data.status === "success") {
                activeUser = u; activeBal = data.balance;
                document.getElementById('bal').innerText = activeBal;
                document.getElementById('loginSection').classList.add('hidden');
                loadSettings();
            } else { 
                document.getElementById('msg').style.color = "#ff4757";
                document.getElementById('msg').innerText = "ভুল আইডি বা পিন!"; 
            }
        } catch(e) {
            document.getElementById('msg').innerText = "নেটওয়ার্ক এরর!";
        }
    }

    async function loadSettings() {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getSettings" }) });
        const data = await res.json();
        if(data.status === "OFF") {
            document.getElementById('offSection').classList.remove('hidden');
            document.getElementById('offNotice').innerText = data.notice;
            return;
        }
        cfg = data;
        document.getElementById('chipArea').innerHTML = data.chips
        .filter(v => v >= MIN_BET && v <= MAX_BET)
        .map(v => `<div class="chip" onclick="setChip(${v})">${v}</div>`).join('');
        startEngine();
    }

    function toggleChipMenu() { 
        if(!isSpinning) { 
            const m = document.getElementById('chipArea'); 
            m.style.display = (m.style.display==='flex')?'none':'flex'; 
        } 
    }

    function setChip(v) { 
        if(v < MIN_BET) v = MIN_BET;
        if(v > MAX_BET) v = MAX_BET;

        selectedChip = v; 
        document.getElementById('selectedVal').innerText = "৳"+v; 
        document.getElementById('chipArea').style.display='none'; 
    }

    function startEngine() {
        setInterval(async () => {
            const now = new Date();
            let totalCycle = cfg.betTime + 10; 
            let sec = now.getSeconds() % totalCycle;

            if (sec < cfg.betTime) {
                if(isSpinning) resetUI();
                document.getElementById('timer').innerText = cfg.betTime - sec;
                document.getElementById('status').innerHTML = `<i class="fas fa-coins"></i> PLACE BETS`;
                document.getElementById('betArea').classList.remove('disabled');
            } else if (sec === cfg.betTime && !isSpinning) {
                document.getElementById('betArea').classList.add('disabled');
                runSpin();
            }
        }, 1000);
    }

    async function runSpin() {
        isSpinning = true;
        document.getElementById('chipArea').style.display = 'none';
        document.getElementById('status').innerHTML = `<i class="fas fa-sync fa-spin"></i> SPINNING...`;
        
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "processWinner", username: activeUser }) });
        const data = await res.json();
        
        let targetDeg = (data.winner === "RED") ? 60 : (data.winner === "BLACK") ? 180 : 300;
        rotation = rotation + (360 * 5) + (360 - (rotation % 360)) - targetDeg;
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            activeBal = data.newBalance;
            document.getElementById('bal').innerText = activeBal;
            document.getElementById('status').innerHTML = `<i class="fas fa-flag-checkered"></i> FINISHED`;
        }, cfg.spinTime * 1000);
    }

    async function placeBet(col) {
        if(isSpinning) return;

        if(selectedChip < MIN_BET || selectedChip > MAX_BET) {
            document.getElementById('chipArea').style.display='none';
            alert("বেট লিমিট: সর্বনিম্ন ৳10 এবং সর্বোচ্চ ৳10,00,000");
            return;
        }

        if(activeBal < selectedChip) return;

        const code = (col === 'RED') ? '1' : (col === 'BLACK') ? '2' : '3';

        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify({ 
                action: "placeBet", 
                username: activeUser, 
                amount: selectedChip, 
                colorCode: code 
            }) 
        });

        activeBal -= selectedChip;
        bets[col] += selectedChip;
        document.getElementById('bal').innerText = activeBal;
        document.getElementById(col === 'RED' ? 'rT' : col === 'BLACK' ? 'bT' : 'gT').innerText = "৳" + bets[col];
    }

    function resetUI() { 
        isSpinning = false; 
        bets = { RED: 0, BLACK: 0, GREEN: 0 }; 
        document.getElementById('rT').innerText = "৳0"; 
        document.getElementById('bT').innerText = "৳0"; 
        document.getElementById('gT').innerText = "৳0"; 
    }
</script>
</body>
</html>
