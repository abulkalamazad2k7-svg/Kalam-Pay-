<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Styled Button</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;

        /* সুন্দর gradient background */
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .btn {
        background: linear-gradient(45deg, #87CEEB, #00c6ff);
        color: white;
        padding: 15px 35px;
        font-size: 20px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        letter-spacing: 1px;

        /* shadow + glow */
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);

        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    .btn:active {
        transform: scale(0.95);
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }
</style>

</head>
<body>

<button class="btn" onclick="openPage()">✨ বউ খেলা</button>

<script>
function openPage() {
    window.location.href = "window.location.href = "" এখানে আপনার লিংক দিন
}
</script>

</body>
</html>
